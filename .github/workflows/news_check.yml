name: 유인호 뉴스 체크

on:
  schedule:
    - cron: '0 23 * * *'    # 매일 오전 8시 KST (UTC 23:00)
    - cron: '0 9 * * *'     # 매일 오후 6시 KST (UTC 09:00)
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install requests

      - name: 뉴스 체크 및 전송
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python check_and_send.py

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_urls.txt subscribers.json
          git diff --cached --quiet || git commit -m "Update seen_urls & subscribers"
          git pull --rebase && git push || true
